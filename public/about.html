<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>About — YES Movement</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>

<nav>
  <a href="/" class="nav-brand">YES</a>
  <ul class="nav-links">
    <li><a href="#" style="display:flex;align-items:center;gap:0.35rem;position:relative;top:3px;"><svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M22.539 8.242H1.46V5.406h21.08v2.836zM1.46 10.812V24L12 18.11 22.54 24V10.812H1.46zM22.54 0H1.46v2.836h21.08V0z"/></svg>The Telescope</a></li>
    <li><a href="/events.html">Summits</a></li>
    <li><a href="/members.html">Groups</a></li>
    <li><a href="/about.html">About</a></li>
  </ul>
  <button class="nav-toggle" aria-label="Toggle menu"><span></span><span></span><span></span></button>
</nav>

<div class="page-header">
  <h1>About</h1>
  <p>Who we are and why we gather.</p>
</div>

<section class="section">
  <p style="max-width:640px;margin:0 auto;font-size:1.1rem;line-height:1.85;color:#ccc;">
    The YES Movement is a placeholder — add your story here.
  </p>
</section>

<div class="cta-section" id="join">
  <h2>Get Involved</h2>
  <p>Ready to say yes? Reach out below.</p>
  <div style="max-width:520px;margin:2rem auto 0;text-align:left;">
    <form id="join-form">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
        <div class="form-group">
          <label>Full Name *</label>
          <input type="text" name="name" required />
        </div>
        <div class="form-group">
          <label>Email *</label>
          <input type="email" name="email" required />
        </div>
      </div>
      <div class="form-group">
        <label>Message *</label>
        <textarea name="message" required placeholder="Tell us about yourself…" style="min-height:120px;"></textarea>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;">Send</button>
    </form>
    <div id="join-success" style="display:none;text-align:center;padding:2rem;color:#ccc;">
      <div style="font-size:2rem;margin-bottom:1rem;">✦</div>
      <h3>Thanks — we'll be in touch.</h3>
    </div>
  </div>
</div>

<footer>
  <div class="footer-brand">✦ YES Movement</div>
  <p>Say yes to what matters.</p>
</footer>

<script src="/js/nav.js"></script>
<script>
  document.getElementById('join-form').addEventListener('submit', e => {
    e.preventDefault();
    document.getElementById('join-form').style.display = 'none';
    document.getElementById('join-success').style.display = 'block';
  });
</script>
</body>
</html>
