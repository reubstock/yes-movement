<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Summits — YES Movement</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>

<nav>
  <a href="/" class="nav-brand">YES</a>
  <ul class="nav-links">
    <li><a href="/telescope.html" style="display:flex;align-items:center;gap:0.35rem;position:relative;top:3px;"><svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M22.539 8.242H1.46V5.406h21.08v2.836zM1.46 10.812V24L12 18.11 22.54 24V10.812H1.46zM22.54 0H1.46v2.836h21.08V0z"/></svg>The Telescope</a></li>
    <li><a href="/events.html">Summits</a></li>
    <li><a href="/members.html">Groups</a></li>
    <li><a href="/about.html">About</a></li>
  </ul>
  <button class="nav-toggle" aria-label="Toggle menu"><span></span><span></span><span></span></button>
</nav>

<div class="page-header">
  <h1>Summits</h1>
  <p>Where and when we gather.</p>
</div>

<section class="section">
  <div style="display:flex;justify-content:flex-end;margin-bottom:2rem;">
    <button class="btn btn-outline" onclick="openModal()">+ Add Summit</button>
  </div>
  <div class="events-grid" id="events-list">
    <div class="loading">Loading summits…</div>
  </div>
</section>

<!-- Add Summit Modal -->
<div id="event-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;align-items:center;justify-content:center;">
  <div style="background:#fff;border:1px solid #ddd;border-radius:4px;padding:2rem;max-width:480px;width:90%;position:relative;">
    <button onclick="closeModal()" style="position:absolute;top:1rem;right:1rem;background:none;border:none;color:#888;font-size:1.5rem;cursor:pointer;">&times;</button>
    <h3 style="margin-bottom:1.5rem;font-weight:400;">Add Summit</h3>
    <form id="event-form">
      <div class="form-group"><label>Title *</label><input type="text" name="title" required /></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
        <div class="form-group"><label>City *</label><input type="text" name="location" required /></div>
        <div class="form-group"><label>Country *</label><input type="text" name="country" required /></div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
        <div class="form-group"><label>Date *</label><input type="date" name="date" required /></div>
        <div class="form-group"><label>Time</label><input type="time" name="time" /></div>
      </div>
      <div class="form-group"><label>Description</label><textarea name="description" style="min-height:80px;"></textarea></div>
      <button type="submit" class="btn btn-primary" style="width:100%;">Add Summit</button>
    </form>
  </div>
</div>

<footer>
  <div class="footer-brand">✦ YES Movement</div>
  <p>Say yes to what matters.</p>
</footer>

<script src="/js/nav.js"></script>
<script>
  async function loadEvents() {
    const res = await fetch('/api/summits');
    const events = await res.json();
    const el = document.getElementById('events-list');
    if (events.length === 0) {
      el.innerHTML = '<div class="empty-state"><div class="empty-icon">🗓</div><p>No summits yet.</p></div>';
      return;
    }
    el.innerHTML = events.map(ev => {
      const d = new Date(ev.date + 'T00:00:00');
      const dateStr = d.toLocaleDateString('en', { day: 'numeric', month: 'long', year: 'numeric' });
      return `<div class="card">
        <h3>${ev.title}</h3>
        <p>📍 ${ev.location}, ${ev.country}</p>
        <p>📅 ${dateStr}${ev.time ? ' at ' + ev.time : ''}${ev.host_name ? ' &middot; 👤 ' + ev.host_name : ''}</p>
        ${ev.description ? '<p style="margin-top:0.5rem;">' + ev.description + '</p>' : ''}
      </div>`;
    }).join('');
  }

  function openModal() { document.getElementById('event-modal').style.display = 'flex'; }
  function closeModal() { document.getElementById('event-modal').style.display = 'none'; }

  document.getElementById('event-form').addEventListener('submit', async e => {
    e.preventDefault();
    const data = Object.fromEntries(new FormData(e.target));
    await fetch('/api/summits', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
    closeModal();
    e.target.reset();
    loadEvents();
  });

  loadEvents();
</script>
</body>
</html>
