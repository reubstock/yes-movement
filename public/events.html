<html lang="en">

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Summits — YES Movement</title>

</head>
<body>

<nav>

  <ul class="nav-links">
    <li><a href="/telescope.html" style="display:flex;align-items:center;gap:0.35rem;position:relative;top:3px;"><svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M22.539 8.242H1.46V5.406h21.08v2.836zM1.46 10.812V24L12 18.11 22.54 24V10.812H1.46zM22.54 0H1.46v2.836h21.08V0z"/></svg>The Telescope</a></li>
    <li><a href="/events.html">Summits</a></li>
    <li><a href="/members.html">Groups</a></li>
    <li><a href="/about.html">About</a></li>
    <li><a href="/?logaction=1" style="background:#dc2626;color:#fff;padding:0.45rem 1rem;border-radius:2px;font-family:Arial,sans-serif;font-size:0.75rem;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;">+ Log Action</a></li>
  </ul>
  <button class="nav-toggle" aria-label="Toggle menu"><span></span><span></span><span></span></button>
</nav>

<section class="section">

  <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem;margin-bottom:2rem;">
    <div style="display:flex;gap:1rem;flex:1;min-width:240px;max-width:520px;">
      <div class="form-group" style="margin:0;flex:1;">
        <input type="text" id="search-title" placeholder="Search by name…" oninput="filterSummits()" />
      </div>
      <div class="form-group" style="margin:0;flex:1;">
        <input type="text" id="search-region" placeholder="Search by region…" oninput="filterSummits()" />
      </div>
    </div>
    <button class="btn btn-primary" onclick="openModal()">+ Add Summit</button>
  </div>

  <div class="members-grid" id="events-list">
    <div class="loading">Loading summits…</div>
  </div>

  <div id="load-more-wrap" style="text-align:center;margin-top:2.5rem;display:none;">
    <button class="btn btn-outline" onclick="showMore()">Load More</button>
  </div>
</section>

<!-- Add Summit Modal -->
<div id="event-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;overflow-y:auto;padding:2rem 1rem;">
  <div style="background:#fff;border:1px solid #ddd;border-radius:4px;padding:2rem;max-width:480px;width:100%;margin:0 auto;position:relative;">
    <button onclick="closeModal()" style="position:absolute;top:1rem;right:1rem;background:none;border:none;color:#888;font-size:1.5rem;cursor:pointer;">&times;</button>
    <h3 style="margin-bottom:1.5rem;font-weight:400;">Add Summit</h3>
    <form id="event-form">
      <div class="form-group"><label>Title *</label><input type="text" name="title" required /></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
        <div class="form-group"><label>City *</label><input type="text" name="location" required /></div>
        <div class="form-group"><label>Country *</label><input type="text" name="country" required /></div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
        <div class="form-group"><label>Date *</label><input type="date" name="date" required /></div>
        <div class="form-group"><label>Time</label><input type="time" name="time" /></div>
      </div>
      <div class="form-group"><label>Host Name</label><input type="text" name="host_name" /></div>
      <div class="form-group"><label>Organizer Email <span style="color:#aaa;font-size:0.8rem;">(for RSVPs)</span></label><input type="email" name="organizer_email" placeholder="your@email.com" /></div>
      <div class="form-group"><label>Description</label><textarea name="description" style="min-height:80px;"></textarea></div>
      <div class="form-group">
        <label>Photo</label>
        <input type="file" id="summit-image-input" accept="image/*" style="width:100%;padding:0.5rem 0;font-family:Arial,sans-serif;font-size:0.85rem;color:#555;" onchange="previewAddImage(this)" />
        <div id="add-image-preview-wrap" style="display:none;margin-top:0.75rem;">
          <img id="add-image-preview" src="" alt="Preview" style="width:100%;height:140px;object-fit:cover;border-radius:2px;border:1px solid #ddd;" />
        </div>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;">Add Summit</button>
    </form>
  </div>
</div>

<!-- Edit Summit Modal -->
<div id="edit-summit-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;overflow-y:auto;padding:2rem 1rem;">
  <div style="background:#fff;border:1px solid #ddd;border-radius:4px;padding:2rem;max-width:480px;width:100%;margin:0 auto;position:relative;">
    <button onclick="closeEditSummit()" style="position:absolute;top:1rem;right:1rem;background:none;border:none;color:#888;font-size:1.5rem;cursor:pointer;">&times;</button>
    <h3 style="margin-bottom:1.5rem;font-weight:400;">Edit Summit</h3>
    <form id="edit-summit-form">
      <input type="hidden" name="id" />
      <div class="form-group"><label>Title *</label><input type="text" name="title" required /></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
        <div class="form-group"><label>City *</label><input type="text" name="location" required /></div>
        <div class="form-group"><label>Country *</label><input type="text" name="country" required /></div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
        <div class="form-group"><label>Date *</label><input type="date" name="date" required /></div>
        <div class="form-group"><label>Time</label><input type="time" name="time" /></div>
      </div>
      <div class="form-group"><label>Host Name</label><input type="text" name="host_name" /></div>
      <div class="form-group"><label>Organizer Email <span style="color:#aaa;font-size:0.8rem;">(for RSVPs)</span></label><input type="email" name="organizer_email" placeholder="your@email.com" /></div>
      <div class="form-group"><label>Description</label><textarea name="description" style="min-height:80px;"></textarea></div>
      <div class="form-group">
        <label>Photo <span style="color:#aaa;font-size:0.8rem;">(leave blank to keep existing)</span></label>
        <input type="file" id="edit-summit-image-input" accept="image/*" style="width:100%;padding:0.5rem 0;font-family:Arial,sans-serif;font-size:0.85rem;color:#555;" onchange="previewEditImage(this)" />
        <div id="edit-image-preview-wrap" style="display:none;margin-top:0.75rem;">
          <img id="edit-image-preview" src="" alt="Preview" style="width:100%;height:140px;object-fit:cover;border-radius:2px;border:1px solid #ddd;" />
        </div>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;">Save Changes</button>
    </form>
  </div>
</div>

<!-- RSVP Modal -->
<div id="rsvp-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;overflow-y:auto;padding:2rem 1rem;">
  <div style="background:#fff;border:1px solid #ddd;border-radius:4px;padding:2rem;max-width:420px;width:100%;margin:0 auto;position:relative;text-align:center;">
    <button onclick="closeRsvpModal()" style="position:absolute;top:1rem;right:1rem;background:none;border:none;color:#888;font-size:1.5rem;cursor:pointer;">&times;</button>
    <div style="font-size:2rem;margin-bottom:0.75rem;">✦</div>
    <h3 id="rsvp-summit-name" style="margin-bottom:0.25rem;font-weight:400;"></h3>
    <p style="color:#555;margin-bottom:1.5rem;font-size:0.9rem;">📍 <span id="rsvp-summit-location"></span></p>
    <form id="rsvp-form" style="text-align:left;">
      <div class="form-group"><input type="text" name="name" placeholder="Your name *" required /></div>
      <div class="form-group"><input type="email" name="email" placeholder="Your email *" required /></div>
      <div class="form-group"><textarea name="message" placeholder="Message (optional)" style="min-height:72px;"></textarea></div>
      <button type="submit" class="btn btn-primary" style="width:100%;">Send RSVP</button>
    </form>
    <div id="rsvp-success-msg" style="display:none;padding:1rem 0;color:#333;">
      <p>✓ RSVP sent. The organiser will be in touch.</p>
    </div>
  </div>
</div>

<footer>
  <div class="footer-brand">✦ YES Movement</div>
  <p>Say yes to what matters.</p>
</footer>

<script src="/js/nav.js"></script>
<script>
  const PAGE_SIZE = 10;
  let allSummits = [];
  let filtered = [];
  let shown = 0;

  function compressImage(file) {
    return new Promise(resolve => {
      const reader = new FileReader();
      reader.onload = e => {
        const img = new Image();
        img.onload = () => {
          const MAX = 1200;
          let w = img.width, h = img.height;
          if (w > MAX || h > MAX) {
            if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
            else        { w = Math.round(w * MAX / h); h = MAX; }
          }
          const canvas = document.createElement('canvas');
          canvas.width = w; canvas.height = h;
          canvas.getContext('2d').drawImage(img, 0, 0, w, h);
          let q = 0.82, dataUrl;
          do { dataUrl = canvas.toDataURL('image/jpeg', q); q -= 0.08; }
          while (dataUrl.length > 1024 * 1024 * 2.5 && q > 0.25);
          resolve(dataUrl);
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    });
  }

  function previewAddImage(input) {
    const wrap = document.getElementById('add-image-preview-wrap');
    const preview = document.getElementById('add-image-preview');
    if (input.files && input.files[0]) {
      const reader = new FileReader();
      reader.onload = e => { preview.src = e.target.result; wrap.style.display = 'block'; };
      reader.readAsDataURL(input.files[0]);
    } else {
      wrap.style.display = 'none';
    }
  }

  function previewEditImage(input) {
    const wrap = document.getElementById('edit-image-preview-wrap');
    const preview = document.getElementById('edit-image-preview');
    if (input.files && input.files[0]) {
      const reader = new FileReader();
      reader.onload = e => { preview.src = e.target.result; wrap.style.display = 'block'; };
      reader.readAsDataURL(input.files[0]);
    } else {
      wrap.style.display = 'none';
    }
  }

  async function loadEvents() {
    const res = await fetch('/api/summits');
    allSummits = await res.json();
    filtered = allSummits;
    shown = 0;
    renderSummits();
  }

  function filterSummits() {
    const title = document.getElementById('search-title').value.trim().toLowerCase();
    const region = document.getElementById('search-region').value.trim().toLowerCase();
    filtered = allSummits.filter(ev => {
      const matchTitle = !title || ev.title.toLowerCase().includes(title);
      const matchRegion = !region ||
        ev.location.toLowerCase().includes(region) ||
        ev.country.toLowerCase().includes(region);
      return matchTitle && matchRegion;
    });
    shown = 0;
    renderSummits();
  }

  function renderSummits() {
    const el = document.getElementById('events-list');
    const wrap = document.getElementById('load-more-wrap');
    const slice = filtered.slice(0, shown + PAGE_SIZE);
    shown = slice.length;

    if (filtered.length === 0) {
      el.innerHTML = '<div class="empty-state"><p>No summits found.</p></div>';
      wrap.style.display = 'none';
      return;
    }

    el.innerHTML = slice.map(ev => {
      const d = new Date(ev.date + 'T00:00:00');
      const dateStr = d.toLocaleDateString('en', { day: 'numeric', month: 'long', year: 'numeric' });
      return `
        <div class="card" style="padding:0;overflow:hidden;display:flex;flex-direction:column;">
          ${ev.image
            ? `<img src="${ev.image}" alt="${ev.title}" style="width:100%;height:180px;object-fit:cover;display:block;" />`
            : `<div style="width:100%;height:180px;background:#f0f0f0;display:flex;align-items:center;justify-content:center;color:#aaa;font-size:2rem;">✦</div>`}
          <div style="padding:1.25rem;flex:1;display:flex;flex-direction:column;">
            <h3 style="margin-bottom:0.4rem;">${ev.title}</h3>
            <p style="margin-bottom:0.25rem;">📍 ${ev.location}, ${ev.country}</p>
            <p style="margin-bottom:0.75rem;">📅 ${dateStr}${ev.time ? ' at ' + ev.time : ''}${ev.host_name ? ' &middot; 👤 ' + ev.host_name : ''}</p>
            ${ev.description ? `<p style="margin-bottom:1rem;">${ev.description}</p>` : ''}
            <div style="display:flex;gap:0.75rem;align-items:center;margin-top:auto;">
              <button class="btn btn-primary" style="flex:1;" onclick="openRsvpModal(${ev.id}, '${ev.title.replace(/'/g,"\\'")}', '${ev.location}, ${ev.country}')">RSVP</button>
              <button onclick="openEditSummitById(${ev.id})" style="font-size:0.75rem;color:#888;background:none;border:none;cursor:pointer;padding:0;text-decoration:underline;white-space:nowrap;">Edit</button>
            </div>
          </div>
        </div>`;
    }).join('');

    wrap.style.display = shown < filtered.length ? 'block' : 'none';
  }

  function showMore() { renderSummits(); }

  // RSVP modal
  let rsvpSummitId = null;
  function openRsvpModal(id, name, location) {
    rsvpSummitId = id;
    document.getElementById('rsvp-summit-name').textContent = name;
    document.getElementById('rsvp-summit-location').textContent = location;
    document.getElementById('rsvp-form').style.display = '';
    document.getElementById('rsvp-form').reset();
    document.getElementById('rsvp-success-msg').style.display = 'none';
    document.getElementById('rsvp-modal').style.display = 'block';
  }
  function closeRsvpModal() {
    document.getElementById('rsvp-modal').style.display = 'none';
    rsvpSummitId = null;
  }
  document.getElementById('rsvp-form').addEventListener('submit', async e => {
    e.preventDefault();
    const btn = e.target.querySelector('button[type="submit"]');
    btn.textContent = 'Sending…';
    btn.disabled = true;
    const data = Object.fromEntries(new FormData(e.target));
    try {
      const res = await fetch(`/api/summits/${rsvpSummitId}/rsvp`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data),
      });
      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.error || 'Failed to send');
      }
      document.getElementById('rsvp-form').style.display = 'none';
      document.getElementById('rsvp-success-msg').style.display = 'block';
    } catch (err) {
      alert(err.message || 'Something went wrong. Please try again.');
      btn.textContent = 'Send RSVP';
      btn.disabled = false;
    }
  });

  function openModal() {
    document.getElementById('event-modal').style.display = 'flex';
  }
  function closeModal() {
    document.getElementById('event-modal').style.display = 'none';
    document.getElementById('event-form').reset();
    document.getElementById('add-image-preview-wrap').style.display = 'none';
  }

  document.getElementById('event-form').addEventListener('submit', async e => {
    e.preventDefault();
    const btn = e.target.querySelector('button[type="submit"]');
    btn.textContent = 'Adding…';
    btn.disabled = true;
    const data = Object.fromEntries(new FormData(e.target));
    const fileInput = document.getElementById('summit-image-input');
    if (fileInput.files && fileInput.files[0]) {
      data.image = await compressImage(fileInput.files[0]);
    }
    try {
      const res = await fetch('/api/summits', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
      if (!res.ok) throw new Error(`Server error ${res.status}`);
      closeModal();
      loadEvents();
    } catch (err) {
      console.error(err);
      alert('Something went wrong adding the summit. Please try again.');
      btn.textContent = 'Add Summit';
      btn.disabled = false;
    }
  });

  // Edit summit
  function openEditSummitById(id) {
    const ev = allSummits.find(x => x.id === id);
    if (ev) openEditSummit(ev);
  }
  function openEditSummit(ev) {
    const form = document.getElementById('edit-summit-form');
    form.elements['id'].value = ev.id;
    form.elements['title'].value = ev.title || '';
    form.elements['location'].value = ev.location || '';
    form.elements['country'].value = ev.country || '';
    form.elements['date'].value = ev.date || '';
    form.elements['time'].value = ev.time || '';
    form.elements['host_name'].value = ev.host_name || '';
    form.elements['organizer_email'].value = ev.organizer_email || '';
    form.elements['description'].value = ev.description || '';
    document.getElementById('edit-summit-image-input').value = '';
    document.getElementById('edit-image-preview-wrap').style.display = 'none';
    document.getElementById('edit-summit-modal').style.display = 'flex';
  }
  function closeEditSummit() {
    document.getElementById('edit-summit-modal').style.display = 'none';
    document.getElementById('edit-summit-form').reset();
    document.getElementById('edit-image-preview-wrap').style.display = 'none';
  }
  document.getElementById('edit-summit-form').addEventListener('submit', async e => {
    e.preventDefault();
    const btn = e.target.querySelector('button[type="submit"]');
    btn.textContent = 'Saving…';
    btn.disabled = true;
    const data = Object.fromEntries(new FormData(e.target));
    const id = data.id;
    delete data.id;
    const fileInput = document.getElementById('edit-summit-image-input');
    if (fileInput.files && fileInput.files[0]) {
      data.image = await compressImage(fileInput.files[0]);
    }
    try {
      const res = await fetch(`/api/summits/${id}`, { method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
      if (!res.ok) throw new Error(`Server error ${res.status}`);
      closeEditSummit();
      loadEvents();
    } catch (err) {
      console.error(err);
      alert('Something went wrong saving the summit. Please try again.');
      btn.textContent = 'Save Changes';
      btn.disabled = false;
    }
  });

  loadEvents();
</script>
</body>
</html>
