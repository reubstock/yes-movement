  <div style="background:#fff;border:1px solid #ddd;border-radius:4px;padding:2rem;max-width:420px;width:90%;position:relative;text-align:center;">
    <button onclick="closeJoinModal()" style="position:absolute;top:1rem;right:1rem;background:none;border:none;color:#888;font-size:1.5rem;cursor:pointer;">&times;</button>
    <div style="font-size:2rem;margin-bottom:0.75rem;">✦</div>

<!-- Create New Group Modal -->
<div id="create-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:200;align-items:center;justify-content:center;">
  <div style="background:#fff;border:1px solid #ddd;border-radius:4px;padding:2rem;max-width:480px;width:90%;position:relative;">
    <button onclick="closeCreateModal()" style="position:absolute;top:1rem;right:1rem;background:none;border:none;color:#888;font-size:1.5rem;cursor:pointer;">&times;</button>
    <h3 style="margin-bottom:1.5rem;font-weight:400;">Create New Group</h3>
    <form id="create-form">
      <div class="form-group"><label>Group Name *</label><input type="text" name="name" required /></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
        <div class="form-group"><label>City *</label><input type="text" name="location" required /></div>
        <div class="form-group"><label>Country *</label><input type="text" name="country" required /></div>
      </div>
      <div class="form-group"><label>Organizer Email <span style="color:#aaa;font-size:0.8rem;">(for join requests)</span></label><input type="email" name="organizer_email" placeholder="your@email.com" /></div>
      <div class="form-group"><label>Description</label><textarea name="description" style="min-height:80px;" placeholder="What does your group do?"></textarea></div>
      <div class="form-group">
        <label>Group Photo</label>
        <input type="file" id="group-image-input" accept="image/*" style="width:100%;padding:0.5rem 0;font-family:Arial,sans-serif;font-size:0.85rem;color:#555;" onchange="previewImage(this)" />
        <div id="image-preview-wrap" style="display:none;margin-top:0.75rem;">
          <img id="image-preview" src="" alt="Preview" style="width:100%;height:140px;object-fit:cover;border-radius:2px;border:1px solid #ddd;" />
        </div>

      <button type="submit" class="btn btn-primary" style="width:100%;background:#f97316;">Create Group</button>
    </form>

<!-- See All Members Modal -->
<div id="see-all-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;overflow-y:auto;padding:2rem 1rem;">

  <div style="background:#fff;border:1px solid #ddd;border-radius:4px;padding:2rem;max-width:460px;width:90%;position:relative;margin:0 auto;">

        <div id="edit-member-photo-preview-wrap" style="display:none;margin-top:0.75rem;">

      <div class="form-group"><label>Group Name *</label><input type="text" name="name" required /></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
        <div class="form-group"><label>City *</label><input type="text" name="location" required /></div>
        <div class="form-group"><label>Country *</label><input type="text" name="country" required /></div>
      </div>
      <div class="form-group"><label>Organizer Email <span style="color:#aaa;font-size:0.8rem;">(for join requests)</span></label><input type="email" name="organizer_email" placeholder="your@email.com" /></div>
      <div class="form-group"><label>Description</label><textarea name="description" style="min-height:80px;" placeholder="What does your group do?"></textarea></div>

        <div id="edit-image-preview-wrap" style="display:none;margin-top:0.75rem;">

<footer>

<script src="/js/nav.js"></script>
<script>
  const PAGE_SIZE = 10;
  let allGroups = [];
  let filtered = [];
  let shown = 0;
  let groupMembersMap = {};   // { groupId: [members] }

  async function loadGroups() {
    const res = await fetch('/api/groups');
    allGroups = await res.json();
    // Fetch members for every group in parallel
    groupMembersMap = {};
    await Promise.all(allGroups.map(async g => {
      try {
        const r = await fetch(`/api/groups/${g.id}/members`);
        groupMembersMap[g.id] = r.ok ? await r.json() : [];
      } catch { groupMembersMap[g.id] = []; }
    }));
    filtered = allGroups;
    shown = 0;
    renderGroups();
  }

  function filterGroups() {
    const name = document.getElementById('search-name').value.trim().toLowerCase();
    const region = document.getElementById('search-region').value.trim().toLowerCase();
    filtered = allGroups.filter(g => {
      const matchName = !name || g.name.toLowerCase().includes(name);
      const matchRegion = !region ||
        g.location.toLowerCase().includes(region) ||
        g.country.toLowerCase().includes(region);
      return matchName && matchRegion;
    });
    shown = 0;
    renderGroups();
  }

  function renderGroups() {
    const el = document.getElementById('groups-list');
    const wrap = document.getElementById('load-more-wrap');
    const slice = filtered.slice(0, shown + PAGE_SIZE);
    shown = slice.length;

    if (filtered.length === 0) {
      el.innerHTML = '<div class="empty-state"><p>No groups found.</p></div>';
      wrap.style.display = 'none';
      return;
    }

    el.innerHTML = slice.map(g => {
      const members = groupMembersMap[g.id] || [];
      const firstMemberRow = members.slice(0, 1).map(m => `
        <div style="display:flex;gap:0.75rem;align-items:center;padding:0.45rem 0;">
          ${m.photo
            ? `<img src="${m.photo}" alt="${m.name}" style="width:38px;height:38px;border-radius:50%;object-fit:cover;flex-shrink:0;" />`
            : `<div style="width:38px;height:38px;border-radius:50%;background:#333;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:1rem;">👤</div>`}
          <div style="flex:1;min-width:0;">
            <div style="font-family:Arial,sans-serif;font-size:0.82rem;font-weight:600;color:#fff;line-height:1.3;">${m.name}</div>
            ${m.specialty ? `<div style="font-family:Arial,sans-serif;font-size:0.7rem;color:#16a34a;margin-top:0.1rem;">${m.specialty}</div>` : ''}
          </div>
        </div>
      `).join('');

      return `
        <div class="card" style="padding:0;overflow:hidden;display:flex;flex-direction:column;">
          ${g.image
            ? `<img src="${g.image}" alt="${g.name}" style="width:100%;height:180px;object-fit:cover;display:block;" />`
            : `<div style="width:100%;height:180px;background:#222;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,0.2);font-size:2rem;">✦</div>`}
          <div style="padding:1.25rem;flex:1;display:flex;flex-direction:column;">
            <!-- Fixed-height header so Join buttons align across cards -->
            <div style="min-height:95px;">
              <h3 style="margin-bottom:0.4rem;">${g.name}</h3>
              <p style="margin-bottom:0.25rem;">📍 ${g.location}, ${g.country}</p>
              ${g.description ? `<p style="margin-top:0.4rem;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;">${g.description}</p>` : ''}
            </div>

            <!-- Join + Edit — side by side, centred -->
            <div style="display:flex;align-items:center;justify-content:center;gap:1rem;padding:1rem 0;border-top:1px solid rgba(255,255,255,0.08);">
              <button class="btn btn-primary" style="background:#f97316;padding:0.65rem 2.25rem;" onclick="openAddMemberModal(${g.id})">Join</button>
              <button onclick="openEditGroupById(${g.id})" style="font-size:0.75rem;color:rgba(255,255,255,0.45);background:none;border:none;cursor:pointer;padding:0;text-decoration:underline;white-space:nowrap;">Edit</button>
            </div>

            <!-- Member panel -->
            <div style="margin:0 -1.25rem;padding:0.85rem 1.25rem 0.75rem;background:rgba(255,255,255,0.1);border-top:1px solid rgba(255,255,255,0.12);">
              <div style="font-family:Arial,sans-serif;font-size:0.6rem;letter-spacing:0.15em;text-transform:uppercase;color:rgba(255,255,255,0.55);margin-bottom:0.35rem;">Members</div>
              ${firstMemberRow || '<div style="font-size:0.78rem;color:rgba(255,255,255,0.4);padding:0.3rem 0;">No members yet.</div>'}
              ${members.length > 0 ? `
                <button onclick="openSeeAllModal(${g.id})" style="margin-top:0.6rem;font-size:0.7rem;font-family:Arial,sans-serif;letter-spacing:0.08em;font-weight:700;color:rgba(255,255,255,0.6);background:none;border:none;cursor:pointer;padding:0;text-transform:uppercase;">See All (${members.length})</button>
              ` : ''}
            </div>

          </div>
        </div>
      `;
    }).join('');

    wrap.style.display = shown < filtered.length ? 'block' : 'none';
  }

  function showMore() { renderGroups(); }

  // Join modal
  let joinGroupId = null;
  function openJoinModal(id, name, location) {
    joinGroupId = id;
    document.getElementById('join-group-name').textContent = name;
    document.getElementById('join-group-location').textContent = location;
    document.getElementById('join-form').style.display = '';
    document.getElementById('join-success-msg').style.display = 'none';
    document.getElementById('join-modal').style.display = 'flex';
  }
  function closeJoinModal() {
    document.getElementById('join-modal').style.display = 'none';
    document.getElementById('join-form').reset();
    joinGroupId = null;
  }
  document.getElementById('join-form').addEventListener('submit', async e => {
    e.preventDefault();
    const btn = e.target.querySelector('button[type="submit"]');
    btn.textContent = 'Sending…';
    btn.disabled = true;
    const data = Object.fromEntries(new FormData(e.target));
    try {
      const res = await fetch(`/api/groups/${joinGroupId}/join`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name: data.name, email: data.email }),
      });
      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.error || 'Failed to send');
      }
      document.getElementById('join-form').style.display = 'none';
      document.getElementById('join-success-msg').style.display = 'block';
    } catch (err) {
      alert(err.message || 'Something went wrong. Please try again.');
      btn.textContent = 'Request to Join';
      btn.disabled = false;
    }
  });

  // ── Image compression ──
  function compressImage(file) {
    return new Promise(resolve => {
      const reader = new FileReader();
      reader.onload = e => {
        const img = new Image();
        img.onload = () => {
          const MAX = 1200;
          let w = img.width, h = img.height;
          if (w > MAX || h > MAX) {
            if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
            else        { w = Math.round(w * MAX / h); h = MAX; }
          }
          const canvas = document.createElement('canvas');
          canvas.width = w; canvas.height = h;
          canvas.getContext('2d').drawImage(img, 0, 0, w, h);
          let q = 0.82, dataUrl;
          do { dataUrl = canvas.toDataURL('image/jpeg', q); q -= 0.08; }
          while (dataUrl.length > 1024 * 1024 * 2.5 && q > 0.25);
          resolve(dataUrl);
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    });
  }

  // Image preview
  function previewImage(input) {
    const wrap = document.getElementById('image-preview-wrap');
    const preview = document.getElementById('image-preview');
    if (input.files && input.files[0]) {
      const reader = new FileReader();
      reader.onload = e => { preview.src = e.target.result; wrap.style.display = 'block'; };
      reader.readAsDataURL(input.files[0]);
    } else {
      wrap.style.display = 'none';
    }
  }

  // Create modal
  function openCreateModal() {
    document.getElementById('create-modal').style.display = 'flex';
  }
  function closeCreateModal() {
    document.getElementById('create-modal').style.display = 'none';
    document.getElementById('create-form').reset();
    document.getElementById('image-preview-wrap').style.display = 'none';
  }
  document.getElementById('create-form').addEventListener('submit', async e => {
    e.preventDefault();
    const btn = e.target.querySelector('button[type="submit"]');
    btn.textContent = 'Creating…';
    btn.disabled = true;
    const data = Object.fromEntries(new FormData(e.target));
    // attach base64 image if provided
    const fileInput = document.getElementById('group-image-input');
    if (fileInput.files && fileInput.files[0]) {
      data.image = await compressImage(fileInput.files[0]);
    }
    try {
      const res = await fetch('/api/groups', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
      if (!res.ok) throw new Error(`Server error ${res.status}`);
      closeCreateModal();
      loadGroups();
    } catch (err) {
      console.error(err);
      alert('Something went wrong creating the group. Please try again.');
      btn.textContent = 'Create Group';
      btn.disabled = false;
    }
  });

  // Edit group modal
  function openEditGroupById(id) {
    const g = allGroups.find(x => x.id === id);
    if (g) openEditGroup(g);
  }
  function openEditGroup(g) {
    const form = document.getElementById('edit-group-form');
    form.elements['id'].value = g.id;
    form.elements['name'].value = g.name || '';
    form.elements['location'].value = g.location || '';
    form.elements['country'].value = g.country || '';
    form.elements['organizer_email'].value = g.organizer_email || '';
    form.elements['description'].value = g.description || '';
    document.getElementById('edit-group-image-input').value = '';
    document.getElementById('edit-image-preview-wrap').style.display = 'none';
    document.getElementById('edit-group-modal').style.display = 'flex';
  }
  function closeEditGroup() {
    document.getElementById('edit-group-modal').style.display = 'none';
    document.getElementById('edit-group-form').reset();
    document.getElementById('edit-image-preview-wrap').style.display = 'none';
  }
  function previewEditGroupImage(input) {
    const wrap = document.getElementById('edit-image-preview-wrap');
    const preview = document.getElementById('edit-image-preview');
    if (input.files && input.files[0]) {
      const reader = new FileReader();
      reader.onload = e => { preview.src = e.target.result; wrap.style.display = 'block'; };
      reader.readAsDataURL(input.files[0]);
    } else {
      wrap.style.display = 'none';
    }
  }
  document.getElementById('edit-group-form').addEventListener('submit', async e => {
    e.preventDefault();
    const btn = e.target.querySelector('button[type="submit"]');
    btn.textContent = 'Saving…';
    btn.disabled = true;
    const data = Object.fromEntries(new FormData(e.target));
    const id = data.id;
    delete data.id;
    const fileInput = document.getElementById('edit-group-image-input');
    if (fileInput.files && fileInput.files[0]) {
      data.image = await compressImage(fileInput.files[0]);
    }
    try {
      const res = await fetch(`/api/groups/${id}`, { method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
      if (!res.ok) throw new Error(`Server error ${res.status}`);
      closeEditGroup();
      loadGroups();
    } catch (err) {
      console.error(err);
      alert('Something went wrong saving the group. Please try again.');
      btn.textContent = 'Save Changes';
      btn.disabled = false;
    }
  });

  // ── See All Members Modal ──
  function openSeeAllModal(groupId) {
    const g = allGroups.find(x => x.id === groupId);
    const members = groupMembersMap[groupId] || [];
    document.getElementById('see-all-group-name').textContent = g ? g.name : 'Members';
    document.getElementById('see-all-list').innerHTML = members.length
      ? members.map(m => `
          <div style="display:flex;gap:0.85rem;align-items:flex-start;padding:0.75rem 0;border-bottom:1px solid rgba(255,255,255,0.08);">
            ${m.photo
              ? `<img src="${m.photo}" alt="${m.name}" style="width:48px;height:48px;border-radius:50%;object-fit:cover;flex-shrink:0;" />`
              : `<div style="width:48px;height:48px;border-radius:50%;background:#2a2a2a;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:1.2rem;">👤</div>`}
            <div style="flex:1;min-width:0;">
              <div style="font-family:Arial,sans-serif;font-size:0.88rem;font-weight:600;color:#fff;">${m.name}</div>
              ${m.specialty ? `<div style="font-family:Arial,sans-serif;font-size:0.72rem;color:#16a34a;margin-top:0.1rem;">${m.specialty}</div>` : ''}
              ${m.description ? `<div style="font-size:0.8rem;color:rgba(255,255,255,0.75);margin-top:0.3rem;line-height:1.5;">${m.description}</div>` : ''}
            </div>
            <button onclick="closeSeeAllModal();openEditMemberModal(${groupId},${m.id})" style="font-size:0.68rem;color:rgba(255,255,255,0.35);background:none;border:none;cursor:pointer;padding:0;text-decoration:underline;flex-shrink:0;">Edit</button>
          </div>
        `).join('')
      : '<p style="color:rgba(255,255,255,0.4);font-size:0.85rem;">No members yet.</p>';
    document.getElementById('see-all-modal').style.display = 'block';
  }
  function closeSeeAllModal() {
    document.getElementById('see-all-modal').style.display = 'none';
  }

  // ── Member photo preview ──
  function previewMemberPhoto(wrapId, previewId, input) {
    const wrap = document.getElementById(wrapId);
    const preview = document.getElementById(previewId);
    if (input.files && input.files[0]) {
      const reader = new FileReader();
      reader.onload = e => { preview.src = e.target.result; wrap.style.display = 'block'; };
      reader.readAsDataURL(input.files[0]);
    } else {
      wrap.style.display = 'none';
    }
  }

  // ── Add Member Modal ──
  function openAddMemberModal(groupId) {
    const form = document.getElementById('add-member-form');
    form.reset();
    form.elements['group_id'].value = groupId;
    document.getElementById('add-member-photo-preview-wrap').style.display = 'none';
    document.getElementById('add-member-modal').style.display = 'block';
  }
  function closeAddMemberModal() {
    document.getElementById('add-member-modal').style.display = 'none';
  }
  document.getElementById('add-member-form').addEventListener('submit', async e => {
    e.preventDefault();
    const btn = e.target.querySelector('button[type="submit"]');
    btn.textContent = 'Adding…'; btn.disabled = true;
    const data = Object.fromEntries(new FormData(e.target));
    const groupId = data.group_id;
    delete data.group_id;
    const fileInput = document.getElementById('add-member-photo-input');
    if (fileInput.files && fileInput.files[0]) {
      data.photo = await compressImage(fileInput.files[0]);
    }
    try {
      const res = await fetch(`/api/groups/${groupId}/members`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data),
      });
      if (!res.ok) throw new Error(`Server error ${res.status}`);
      closeAddMemberModal();
      await loadGroups();
    } catch (err) {
      console.error(err);
      alert('Something went wrong adding the member. Please try again.');
      btn.textContent = 'Add Member'; btn.disabled = false;
    }
  });

  // ── Edit Member Modal ──
  function openEditMemberModal(groupId, memberId) {
    const members = groupMembersMap[groupId] || [];
    const m = members.find(x => x.id === memberId);
    if (!m) return;
    const form = document.getElementById('edit-member-form');
    form.elements['group_id'].value = groupId;
    form.elements['member_id'].value = memberId;
    form.elements['name'].value = m.name || '';
    form.elements['specialty'].value = m.specialty || '';
    form.elements['description'].value = m.description || '';
    document.getElementById('edit-member-photo-input').value = '';
    document.getElementById('edit-member-photo-preview-wrap').style.display = 'none';
    document.getElementById('edit-member-modal').style.display = 'block';
  }
  function closeEditMemberModal() {
    document.getElementById('edit-member-modal').style.display = 'none';
  }
  document.getElementById('edit-member-form').addEventListener('submit', async e => {
    e.preventDefault();
    const btn = e.target.querySelector('button[type="submit"]');
    btn.textContent = 'Saving…'; btn.disabled = true;
    const data = Object.fromEntries(new FormData(e.target));
    const groupId = data.group_id;
    const memberId = data.member_id;
    delete data.group_id; delete data.member_id;
    const fileInput = document.getElementById('edit-member-photo-input');
    if (fileInput.files && fileInput.files[0]) {
      data.photo = await compressImage(fileInput.files[0]);
    }
    try {
      const res = await fetch(`/api/groups/${groupId}/members/${memberId}`, {
        method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data),
      });
      if (!res.ok) throw new Error(`Server error ${res.status}`);
      closeEditMemberModal();
      await loadGroups();
    } catch (err) {
      console.error(err);
      alert('Something went wrong saving the member. Please try again.');
      btn.textContent = 'Save Changes'; btn.disabled = false;
    }
  });
  async function deleteMember() {
    const form = document.getElementById('edit-member-form');
    const groupId = form.elements['group_id'].value;
    const memberId = form.elements['member_id'].value;
    if (!confirm('Remove this member from the group?')) return;
    try {
      await fetch(`/api/groups/${groupId}/members/${memberId}`, { method: 'DELETE' });
      closeEditMemberModal();
      await loadGroups();
    } catch (err) {
      alert('Something went wrong. Please try again.');
    }
  }

  loadGroups();
</script>
</body>
</html>
