<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Groups — YES Movement</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>

<nav>
  <a href="/" class="nav-brand" style="display:flex;align-items:center;gap:0.4rem;"><span style="font-family:Arial,sans-serif;font-size:0.7rem;font-weight:700;letter-spacing:0.12em;color:#fff;text-transform:uppercase;">THE</span><img src="/images/yes-flower.png" alt="YES" style="height:38px;width:auto;display:block;border-radius:50%;" /><span style="font-family:Arial,sans-serif;font-size:0.7rem;font-weight:700;letter-spacing:0.12em;color:#fff;text-transform:uppercase;">MOVEMENT</span></a>
  <ul class="nav-links">
    <li><a href="/telescope.html" style="display:flex;align-items:center;gap:0.35rem;position:relative;top:3px;"><svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M22.539 8.242H1.46V5.406h21.08v2.836zM1.46 10.812V24L12 18.11 22.54 24V10.812H1.46zM22.54 0H1.46v2.836h21.08V0z"/></svg>The Telescope</a></li>
    <li><a href="/events.html">Summits</a></li>
    <li><a href="/members.html">Groups</a></li>
    <li><a href="/about.html">About</a></li>
    <li><a href="/?logaction=1" style="background:#dc2626;color:#fff;padding:0.45rem 1rem;border-radius:2px;font-family:Arial,sans-serif;font-size:0.75rem;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;">+ Log Action</a></li>
  </ul>
  <button class="nav-toggle" aria-label="Toggle menu"><span></span><span></span><span></span></button>
</nav>

<section class="section">

  <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem;margin-bottom:2rem;">
    <div style="display:flex;gap:1rem;flex:1;min-width:240px;max-width:520px;">
      <div class="form-group" style="margin:0;flex:1;">
        <input type="text" id="search-name" placeholder="Search by name…" oninput="filterGroups()" />
      </div>
      <div class="form-group" style="margin:0;flex:1;">
        <input type="text" id="search-region" placeholder="Search by region…" oninput="filterGroups()" />
      </div>
    </div>
    <button class="btn btn-primary" onclick="openCreateModal()">+ Create New Group</button>
  </div>

  <div class="members-grid" id="groups-list">
    <div class="loading">Loading groups…</div>
  </div>

  <div id="load-more-wrap" style="text-align:center;margin-top:2.5rem;display:none;">
    <button class="btn btn-outline" onclick="showMore()">Load More</button>
  </div>
</section>

<!-- Join Modal -->
<div id="join-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:200;align-items:center;justify-content:center;">
  <div style="background:#fff;border:1px solid #ddd;border-radius:4px;padding:2rem;max-width:420px;width:90%;position:relative;text-align:center;">
    <button onclick="closeJoinModal()" style="position:absolute;top:1rem;right:1rem;background:none;border:none;color:#888;font-size:1.5rem;cursor:pointer;">&times;</button>
    <div style="font-size:2rem;margin-bottom:0.75rem;">✦</div>
    <h3 id="join-group-name" style="margin-bottom:0.5rem;font-weight:400;"></h3>
    <p style="color:#555;margin-bottom:1.5rem;font-size:0.9rem;">📍 <span id="join-group-location"></span></p>
    <form id="join-form">
      <div class="form-group"><input type="text" name="name" placeholder="Your name *" required /></div>
      <div class="form-group"><input type="email" name="email" placeholder="Your email *" required /></div>
      <button type="submit" class="btn btn-primary" style="width:100%;">Request to Join</button>
    </form>
    <div id="join-success-msg" style="display:none;padding:1rem 0;color:#333;">
      <p>✓ Request sent. The group organiser will be in touch.</p>
    </div>
  </div>
</div>

<!-- Create New Group Modal -->
<div id="create-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:200;align-items:center;justify-content:center;">
  <div style="background:#fff;border:1px solid #ddd;border-radius:4px;padding:2rem;max-width:480px;width:90%;position:relative;">
    <button onclick="closeCreateModal()" style="position:absolute;top:1rem;right:1rem;background:none;border:none;color:#888;font-size:1.5rem;cursor:pointer;">&times;</button>
    <h3 style="margin-bottom:1.5rem;font-weight:400;">Create New Group</h3>
    <form id="create-form">
      <div class="form-group"><label>Group Name *</label><input type="text" name="name" required /></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
        <div class="form-group"><label>City *</label><input type="text" name="location" required /></div>
        <div class="form-group"><label>Country *</label><input type="text" name="country" required /></div>
      </div>
      <div class="form-group"><label>Your Name</label><input type="text" name="contact" /></div>
      <div class="form-group"><label>Description</label><textarea name="description" style="min-height:80px;" placeholder="What does your group do?"></textarea></div>
      <div class="form-group">
        <label>Group Photo</label>
        <input type="file" id="group-image-input" accept="image/*" style="width:100%;padding:0.5rem 0;font-family:Arial,sans-serif;font-size:0.85rem;color:#555;" onchange="previewImage(this)" />
        <div id="image-preview-wrap" style="display:none;margin-top:0.75rem;">
          <img id="image-preview" src="" alt="Preview" style="width:100%;height:140px;object-fit:cover;border-radius:2px;border:1px solid #ddd;" />
        </div>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;">Create Group</button>
    </form>
  </div>
</div>

<!-- Edit Group Modal -->
<div id="edit-group-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:200;align-items:center;justify-content:center;">
  <div style="background:#fff;border:1px solid #ddd;border-radius:4px;padding:2rem;max-width:480px;width:90%;position:relative;">
    <button onclick="closeEditGroup()" style="position:absolute;top:1rem;right:1rem;background:none;border:none;color:#888;font-size:1.5rem;cursor:pointer;">&times;</button>
    <h3 style="margin-bottom:1.5rem;font-weight:400;">Edit Group</h3>
    <form id="edit-group-form">
      <input type="hidden" name="id" />
      <div class="form-group"><label>Group Name *</label><input type="text" name="name" required /></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
        <div class="form-group"><label>City *</label><input type="text" name="location" required /></div>
        <div class="form-group"><label>Country *</label><input type="text" name="country" required /></div>
      </div>
      <div class="form-group"><label>Your Name</label><input type="text" name="contact" /></div>
      <div class="form-group"><label>Description</label><textarea name="description" style="min-height:80px;" placeholder="What does your group do?"></textarea></div>
      <div class="form-group">
        <label>Group Photo <span style="color:#aaa;font-size:0.8rem;">(leave blank to keep existing)</span></label>
        <input type="file" id="edit-group-image-input" accept="image/*" style="width:100%;padding:0.5rem 0;font-family:Arial,sans-serif;font-size:0.85rem;color:#555;" onchange="previewEditGroupImage(this)" />
        <div id="edit-image-preview-wrap" style="display:none;margin-top:0.75rem;">
          <img id="edit-image-preview" src="" alt="Preview" style="width:100%;height:140px;object-fit:cover;border-radius:2px;border:1px solid #ddd;" />
        </div>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;">Save Changes</button>
    </form>
  </div>
</div>

<footer>
  <div class="footer-brand">✦ YES Movement</div>
  <p>Say yes to what matters.</p>
</footer>

<script src="/js/nav.js"></script>
<script>
  const PAGE_SIZE = 10;
  let allGroups = [];
  let filtered = [];
  let shown = 0;

  async function loadGroups() {
    const res = await fetch('/api/groups');
    allGroups = await res.json();
    filtered = allGroups;
    shown = 0;
    renderGroups();
  }

  function filterGroups() {
    const name = document.getElementById('search-name').value.trim().toLowerCase();
    const region = document.getElementById('search-region').value.trim().toLowerCase();
    filtered = allGroups.filter(g => {
      const matchName = !name || g.name.toLowerCase().includes(name);
      const matchRegion = !region ||
        g.location.toLowerCase().includes(region) ||
        g.country.toLowerCase().includes(region);
      return matchName && matchRegion;
    });
    shown = 0;
    renderGroups();
  }

  function renderGroups() {
    const el = document.getElementById('groups-list');
    const wrap = document.getElementById('load-more-wrap');
    const slice = filtered.slice(0, shown + PAGE_SIZE);
    shown = slice.length;

    if (filtered.length === 0) {
      el.innerHTML = '<div class="empty-state"><p>No groups found.</p></div>';
      wrap.style.display = 'none';
      return;
    }

    el.innerHTML = slice.map(g => `
      <div class="card" style="padding:0;overflow:hidden;display:flex;flex-direction:column;">
        ${g.image ? `<img src="${g.image}" alt="${g.name}" style="width:100%;height:180px;object-fit:cover;display:block;" />` : `<div style="width:100%;height:180px;background:#f0f0f0;display:flex;align-items:center;justify-content:center;color:#aaa;font-size:2rem;">✦</div>`}
        <div style="padding:1.25rem;flex:1;display:flex;flex-direction:column;">
          <h3 style="margin-bottom:0.4rem;">${g.name}</h3>
          <p style="margin-bottom:0.25rem;">📍 ${g.location}, ${g.country}</p>
          ${g.contact ? `<p style="margin-bottom:0.75rem;">👤 ${g.contact}</p>` : '<p style="margin-bottom:0.75rem;"></p>'}
          ${g.description ? `<p style="margin-bottom:1rem;">${g.description}</p>` : ''}
          <div style="display:flex;gap:0.75rem;align-items:center;margin-top:auto;">
            <button class="btn btn-primary" style="flex:1;" onclick="openJoinModal(${g.id}, '${g.name.replace(/'/g,"\\'")}', '${g.location}, ${g.country}')">Join</button>
            <button onclick="openEditGroupById(${g.id})" style="font-size:0.75rem;color:#888;background:none;border:none;cursor:pointer;padding:0;text-decoration:underline;white-space:nowrap;">Edit</button>
          </div>
        </div>
      </div>
    `).join('');

    wrap.style.display = shown < filtered.length ? 'block' : 'none';
  }

  function showMore() { renderGroups(); }

  // Join modal
  function openJoinModal(id, name, location) {
    document.getElementById('join-group-name').textContent = name;
    document.getElementById('join-group-location').textContent = location;
    document.getElementById('join-form').style.display = '';
    document.getElementById('join-success-msg').style.display = 'none';
    document.getElementById('join-modal').style.display = 'flex';
  }
  function closeJoinModal() {
    document.getElementById('join-modal').style.display = 'none';
    document.getElementById('join-form').reset();
  }
  document.getElementById('join-form').addEventListener('submit', e => {
    e.preventDefault();
    document.getElementById('join-form').style.display = 'none';
    document.getElementById('join-success-msg').style.display = 'block';
  });

  // Image preview
  function previewImage(input) {
    const wrap = document.getElementById('image-preview-wrap');
    const preview = document.getElementById('image-preview');
    if (input.files && input.files[0]) {
      const reader = new FileReader();
      reader.onload = e => { preview.src = e.target.result; wrap.style.display = 'block'; };
      reader.readAsDataURL(input.files[0]);
    } else {
      wrap.style.display = 'none';
    }
  }

  // Create modal
  function openCreateModal() {
    document.getElementById('create-modal').style.display = 'flex';
  }
  function closeCreateModal() {
    document.getElementById('create-modal').style.display = 'none';
    document.getElementById('create-form').reset();
    document.getElementById('image-preview-wrap').style.display = 'none';
  }
  document.getElementById('create-form').addEventListener('submit', async e => {
    e.preventDefault();
    const btn = e.target.querySelector('button[type="submit"]');
    btn.textContent = 'Creating…';
    btn.disabled = true;
    const data = Object.fromEntries(new FormData(e.target));
    // attach base64 image if provided
    const fileInput = document.getElementById('group-image-input');
    if (fileInput.files && fileInput.files[0]) {
      data.image = await new Promise(resolve => {
        const reader = new FileReader();
        reader.onload = ev => resolve(ev.target.result);
        reader.readAsDataURL(fileInput.files[0]);
      });
    }
    try {
      const res = await fetch('/api/groups', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
      if (!res.ok) throw new Error(`Server error ${res.status}`);
      closeCreateModal();
      loadGroups();
    } catch (err) {
      console.error(err);
      alert('Something went wrong creating the group. Please try again.');
      btn.textContent = 'Create Group';
      btn.disabled = false;
    }
  });

  // Edit group modal
  function openEditGroupById(id) {
    const g = allGroups.find(x => x.id === id);
    if (g) openEditGroup(g);
  }
  function openEditGroup(g) {
    const form = document.getElementById('edit-group-form');
    form.elements['id'].value = g.id;
    form.elements['name'].value = g.name || '';
    form.elements['location'].value = g.location || '';
    form.elements['country'].value = g.country || '';
    form.elements['contact'].value = g.contact || '';
    form.elements['description'].value = g.description || '';
    document.getElementById('edit-group-image-input').value = '';
    document.getElementById('edit-image-preview-wrap').style.display = 'none';
    document.getElementById('edit-group-modal').style.display = 'flex';
  }
  function closeEditGroup() {
    document.getElementById('edit-group-modal').style.display = 'none';
    document.getElementById('edit-group-form').reset();
    document.getElementById('edit-image-preview-wrap').style.display = 'none';
  }
  function previewEditGroupImage(input) {
    const wrap = document.getElementById('edit-image-preview-wrap');
    const preview = document.getElementById('edit-image-preview');
    if (input.files && input.files[0]) {
      const reader = new FileReader();
      reader.onload = e => { preview.src = e.target.result; wrap.style.display = 'block'; };
      reader.readAsDataURL(input.files[0]);
    } else {
      wrap.style.display = 'none';
    }
  }
  document.getElementById('edit-group-form').addEventListener('submit', async e => {
    e.preventDefault();
    const btn = e.target.querySelector('button[type="submit"]');
    btn.textContent = 'Saving…';
    btn.disabled = true;
    const data = Object.fromEntries(new FormData(e.target));
    const id = data.id;
    delete data.id;
    const fileInput = document.getElementById('edit-group-image-input');
    if (fileInput.files && fileInput.files[0]) {
      data.image = await new Promise(resolve => {
        const reader = new FileReader();
        reader.onload = ev => resolve(ev.target.result);
        reader.readAsDataURL(fileInput.files[0]);
      });
    }
    try {
      const res = await fetch(`/api/groups/${id}`, { method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
      if (!res.ok) throw new Error(`Server error ${res.status}`);
      closeEditGroup();
      loadGroups();
    } catch (err) {
      console.error(err);
      alert('Something went wrong saving the group. Please try again.');
      btn.textContent = 'Save Changes';
      btn.disabled = false;
    }
  });

  loadGroups();
</script>
</body>
</html>
