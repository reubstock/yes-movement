<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Members — YES Movement</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>

<nav>
  <a href="/" class="nav-brand">YES Movement</a>
  <ul class="nav-links">
    <li><a href="/events.html">Events</a></li>
    <li><a href="/members.html">Members</a></li>
    <li><a href="/about.html">About</a></li>
  </ul>
  <button class="nav-toggle" aria-label="Toggle menu"><span></span><span></span><span></span></button>
</nav>

<div class="page-header">
  <h1>Members</h1>
  <p>The people who said yes.</p>
</div>

<section class="section">
  <div class="members-grid" id="members-list">
    <div class="loading">Loading members…</div>
  </div>
</section>

<footer>
  <div class="footer-brand">✦ YES Movement</div>
  <p>Say yes to what matters.</p>
</footer>

<script src="/js/nav.js"></script>
<script>
  async function loadMembers() {
    const res = await fetch('/api/members');
    const members = await res.json();
    const el = document.getElementById('members-list');
    el.innerHTML = members.map(m => {
      const initials = m.name.split(' ').map(n => n[0]).join('');
      return `<div class="card" style="text-align:center;">
        <div style="width:52px;height:52px;border-radius:50%;background:#1a1a1a;border:1px solid #333;display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;font-size:1.1rem;color:#ccc;">${initials}</div>
        <h3>${m.name}</h3>
        <p>📍 ${m.location}, ${m.country}</p>
        ${m.bio ? '<p style="margin-top:0.5rem;">' + m.bio + '</p>' : ''}
        ${m.joined_year ? '<p style="margin-top:0.5rem;font-size:0.8rem;color:#555;">Member since ' + m.joined_year + '</p>' : ''}
      </div>`;
    }).join('');
  }
  loadMembers();
</script>
</body>
</html>
